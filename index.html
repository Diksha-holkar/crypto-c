<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crypto Challenge</title>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        input, select {
            padding: 10px;
            width: 250px;
            margin-top: 15px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            background-color: #22c55e;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #16a34a;
        }

        #result, #hintResult {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🔐 Crypto Challenge</h2>

    <p>Decode this message:</p>

    <h3>
        cml0Q1RGe2Vhc3lfZmxhZ30=
    </h3>

    <!-- FLAG INPUT -->
    <input type="text" id="flagInput" placeholder="Enter your flag">

    <br>

    <button onclick="checkFlag()">Submit</button>

    <p id="result"></p>

    <hr>

    <!-- HINT SECTION -->
    <p>Need a hint? Choose wisely 👇</p>

    <select id="hintSelect">
        <option value="">Select a hint</option>
        <option value="wrong1">This is encrypted with AES</option>
        <option value="wrong2">Try brute force</option>
        <option value="correct">This is a common encoding format</option>
    </select>

    <br>

    <button onclick="showHint()">Get Hint</button>

    <p id="hintResult"></p>

</div>

<script src="script.js"></script>

</body>
</html>
