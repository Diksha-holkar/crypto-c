<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Easy Crypto Challenge</title>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        input {
            padding: 10px;
            width: 250px;
            margin-top: 15px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            background-color: #22c55e;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🔐 Easy Crypto Challenge</h2>

    <p>Decode this message:</p>

    <h3>
        cml0Q1RGe2Vhc3lfZmxhZ30=
    </h3>

    <p>💡 Hint: It's Base64</p>

    <input type="text" id="flagInput" placeholder="Enter your flag">

    <br>

    <button onclick="checkFlag()">Submit</button>

    <p id="result"></p>

</div>

<script src="script.js"></script>

</body>
</html>
